  <line x1="26.5" y1="37.5" x2="17" y2="44" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="37.5" y1="37.5" x2="47" y2="44" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow / triangle up -->
